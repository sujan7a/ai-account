<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Account Tracker — Cooldown Manager</title>
  <meta name="description"
    content="Track your AI sub-accounts, monitor cooldown timers, and know exactly when each account is ready to use again.">
  <meta name="color-scheme" content="dark light">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
  </noscript>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
        </div>
        <div>
          <h1>AI Account Tracker</h1>
          <p class="subtitle">Monitor cooldowns &amp; availability</p>
        </div>
      </div>
      <div class="header-right">
        <div class="stats-bar">
          <div class="stat" id="stat-total">
            <span class="stat-value">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat stat-ready" id="stat-ready">
            <span class="stat-value">0</span>
            <span class="stat-label">Ready</span>
          </div>
          <div class="stat stat-in-use" id="stat-in-use">
            <span class="stat-value">0</span>
            <span class="stat-label">In Use</span>
          </div>
          <div class="stat stat-cooling" id="stat-cooling">
            <span class="stat-value">0</span>
            <span class="stat-label">Cooling</span>
          </div>
        </div>
        <button class="stat-btn" id="btn-link-file" title="Save data to a local JSON file">
          <span class="stat-value">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="12" y1="18" x2="12" y2="12" />
              <line x1="9" y1="15" x2="15" y2="15" />
            </svg>
          </span>
          <span class="stat-label" id="file-link-label">Link File</span>
        </button>
        <button class="stat-btn" id="btn-import-file" title="Load data from an existing JSON file"
          style="display: none;">
          <span class="stat-value">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="12" y1="12" x2="12" y2="18" />
              <polyline points="9 15 12 12 15 15" />
            </svg>
          </span>
          <span class="stat-label" id="file-import-label">Load File</span>
        </button>
        <input type="file" id="input-import-file" accept=".json" style="display: none;">
        <button class="stat-btn" id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
          <span class="stat-value theme-icon-dark">🌙</span>
          <span class="stat-value theme-icon-light">☀️</span>
          <span class="stat-label">Theme</span>
        </button>
      </div>
    </header>

    <!-- Add Account Form -->
    <section class="card add-account-card">
      <div class="card-header" id="toggle-add-form">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" class="section-icon">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" y1="8" x2="19" y2="14" />
            <line x1="22" y1="11" x2="16" y2="11" />
          </svg>
          Add New Account
        </h2>
        <span class="toggle-icon" id="toggle-icon">▼</span>
      </div>
      <form id="add-account-form" class="form-body">
        <div class="form-row">
          <div class="form-group">
            <label for="account-name">Account Name</label>
            <input type="text" id="account-name" placeholder="e.g. Claude Pro #1" required>
          </div>
          <div class="form-group">
            <label for="account-email">Email Address</label>
            <input type="email" id="account-email" placeholder="e.g. user@example.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-add-account">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Account
        </button>
      </form>
    </section>

    <!-- Account List -->
    <section class="accounts-section">
      <div class="section-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" class="section-icon">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
          Your Accounts
        </h2>
        <div class="filter-pills">
          <button class="pill active" data-filter="all" id="filter-all">All</button>
          <button class="pill" data-filter="ready" id="filter-ready">Ready</button>
          <button class="pill" data-filter="in-use" id="filter-in-use">In Use</button>
          <button class="pill" data-filter="cooling" id="filter-cooling">Cooling Down</button>
        </div>
      </div>

      <div id="accounts-list" class="accounts-list">
        <!-- Accounts will be rendered here -->
      </div>

      <div id="empty-state" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <h3>No accounts yet</h3>
        <p>Add your first AI sub-account above to start tracking.</p>
      </div>
    </section>
  </div>

  <!-- Set Cooldown Modal -->
  <div class="modal-overlay" id="cooldown-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" class="section-icon">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          Set Cooldown Timer
        </h3>
        <button class="btn-close" id="btn-close-modal">&times;</button>
      </div>
      <p class="modal-subtitle">Account: <strong id="modal-account-name"></strong></p>
      <form id="cooldown-form">
        <div class="timer-inputs">
          <div class="timer-group">
            <input type="number" id="cooldown-days" min="0" max="30" value="0" placeholder="0">
            <label>Days</label>
          </div>
          <span class="timer-sep">:</span>
          <div class="timer-group">
            <input type="number" id="cooldown-hours" min="0" max="23" value="0" placeholder="0">
            <label>Hours</label>
          </div>
          <span class="timer-sep">:</span>
          <div class="timer-group">
            <input type="number" id="cooldown-minutes" min="0" max="59" value="0" placeholder="0">
            <label>Minutes</label>
          </div>
        </div>
        <div class="quick-presets">
          <button type="button" class="preset-btn" data-days="0" data-hours="1" data-minutes="0">1h</button>
          <button type="button" class="preset-btn" data-days="0" data-hours="2" data-minutes="0">2h</button>
          <button type="button" class="preset-btn" data-days="0" data-hours="4" data-minutes="0">4h</button>
          <button type="button" class="preset-btn" data-days="0" data-hours="4" data-minutes="30">4h 30m</button>
          <button type="button" class="preset-btn" data-days="0" data-hours="5" data-minutes="0">5h</button>
          <button type="button" class="preset-btn" data-days="0" data-hours="8" data-minutes="0">8h</button>
          <button type="button" class="preset-btn" data-days="1" data-hours="0" data-minutes="0">1d</button>
          <button type="button" class="preset-btn" data-days="2" data-hours="0" data-minutes="0">2d</button>
          <button type="button" class="preset-btn" data-days="3" data-hours="0" data-minutes="0">3d</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="btn-cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-set-cooldown">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
            Start Cooldown
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>

</html>
